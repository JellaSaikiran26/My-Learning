<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Savings Planner</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f8;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#eef7ff;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Smart Savings Planner</h1>

<label>Current Account Balance (₹)</label>
<input type="number" id="balance">

<label>Amount You Want To Save (₹)</label>
<input type="number" id="saveAmount">

<label>Risk Profile</label>
<select id="risk">
<option value="conservative">Conservative</option>
<option value="moderate">Moderate</option>
<option value="aggressive">Aggressive</option>
</select>

<button onclick="calculate()">Get Recommendation</button>

<div class="result" id="output">
Enter details and click Get Recommendation.
</div>

</div>

<script>

function calculate(){

let balance = Number(document.getElementById("balance").value);
let saveAmount = Number(document.getElementById("saveAmount").value);
let risk = document.getElementById("risk").value;

if(saveAmount > balance){
    document.getElementById("output").innerHTML =
    "❌ Savings amount cannot be greater than account balance.";
    return;
}

let sip = 0;
let emergency = 0;
let fd = 0;
let gold = 0;

if(risk === "conservative"){

    fd = Math.round(saveAmount * 0.60);
    emergency = Math.round(saveAmount * 0.25);
    gold = Math.round(saveAmount * 0.15);

}

if(risk === "moderate"){

    sip = Math.round(saveAmount * 0.60);
    emergency = Math.round(saveAmount * 0.20);
    fd = Math.round(saveAmount * 0.20);

}

if(risk === "aggressive"){

    sip = Math.round(saveAmount * 0.80);
    emergency = Math.round(saveAmount * 0.10);
    gold = Math.round(saveAmount * 0.10);

}

let remainingBalance = balance - saveAmount;

document.getElementById("output").innerHTML = `

<h2>📊 Recommendation</h2>

<p><b>Current Balance:</b> ₹${balance.toLocaleString()}</p>

<p><b>Amount To Save:</b> ₹${saveAmount.toLocaleString()}</p>

<p><b>Remaining Spendable Money:</b> ₹${remainingBalance.toLocaleString()}</p>

<hr>

<h3>Suggested Allocation</h3>

${sip > 0 ? `<p>📈 SIP / Mutual Funds: ₹${sip.toLocaleString()}</p>` : ""}

${fd > 0 ? `<p>🏦 FD / RD: ₹${fd.toLocaleString()}</p>` : ""}

${emergency > 0 ? `<p>🛡 Emergency Fund: ₹${emergency.toLocaleString()}</p>` : ""}

${gold > 0 ? `<p>🥇 Gold ETF / SGB: ₹${gold.toLocaleString()}</p>` : ""}

<hr>

<p><b>Risk Profile:</b> ${risk.toUpperCase()}</p>

`;

}

</script>

</body>
</html>
